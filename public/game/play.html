<!DOCTYPE html>
<html lang="vi" style="width:100%;height:100%;background-color:black;">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0">
    <title>Minecraft 1.12.2 - Playing</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #121212;
            touch-action: none;
        }

        #back-btn {
            position: fixed;
            top: 8px;
            right: 8px;
            z-index: 100001;
            background: rgba(0, 0, 0, 0.7);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 6px 14px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 12px;
            opacity: 0.5;
            transition: opacity 0.3s;
            font-family: sans-serif;
        }

        #back-btn:hover {
            opacity: 1;
            background: rgba(0, 0, 0, 0.9);
        }

        /* Mobile Controls Styling */
        #mobile-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 100000;
            pointer-events: none;
            display: none;
            /* Hiện nếu là mobile */
        }

        #mobile-overlay .touch-btn {
            pointer-events: auto;
            position: absolute;
            background: rgba(255, 255, 255, 0.15);
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
            user-select: none;
            -webkit-user-select: none;
            backdrop-filter: blur(2px);
        }

        #mobile-overlay .touch-btn:active {
            background: rgba(255, 255, 255, 0.4);
            transform: scale(0.95);
        }

        /* Joystick */
        #joystick-container {
            pointer-events: auto;
            position: absolute;
            bottom: 40px;
            left: 40px;
            width: 150px;
            height: 150px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            border: 2px solid rgba(255, 255, 255, 0.2);
        }

        #joystick-knob {
            position: absolute;
            width: 60px;
            height: 60px;
            background: rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            top: 45px;
            left: 45px;
            pointer-events: none;
        }

        /* Vùng xoay camera bên phải */
        #touch-camera-area {
            position: absolute;
            right: 0;
            top: 0;
            width: 60%;
            height: 100%;
            pointer-events: auto;
        }

        /* Nút chức năng */
        #btn-jump {
            bottom: 120px;
            right: 40px;
            width: 70px;
            height: 70px;
        }

        #btn-inventory {
            top: 20px;
            left: 20px;
            width: 50px;
            height: 50px;
            border-radius: 8px;
            font-size: 20px;
        }

        #btn-attack {
            bottom: 40px;
            right: 130px;
            width: 70px;
            height: 70px;
            background: rgba(255, 0, 0, 0.2);
        }

        #btn-place {
            bottom: 40px;
            right: 40px;
            width: 70px;
            height: 70px;
            background: rgba(0, 255, 0, 0.2);
        }

        #btn-crouch {
            bottom: 200px;
            right: 40px;
            width: 60px;
            height: 60px;
            font-size: 12px;
        }

        #launch_countdown_screen {
            margin: 0px;
            width: 100%;
            height: 100%;
            font-family: sans-serif;
            display: flex;
            align-items: center;
            user-select: none;
            background: #121212;
            position: fixed;
            z-index: 100005;
        }

        #launch_countdown_screen>div {
            margin: auto;
            text-align: center;
            color: #FFFFFF;
        }

        #launch_countdown_screen .progress-border {
            border: 2px solid #FFFFFF;
            width: 80%;
            max-width: 400px;
            height: 15px;
            padding: 1px;
            margin: 0 auto 20vh;
        }

        #launchCountdownProgress {
            background-color: #555555;
            width: 0%;
            height: 100%;
            transition: width 0.3s;
        }

        #skipCountdown {
            padding: 10px 20px;
            font-size: 1rem;
            color: #FFFFFF;
            background-color: #333333;
            border: none;
            cursor: pointer;
            border-radius: 5px;
        }

        #skipCountdown:hover {
            background-color: #555555;
        }
    </style>
</head>

<body id="game_frame">
    <button id="back-btn" onclick="history.back()">✕ Quay lại</button>

    <!-- Mobile Overlay -->
    <div id="mobile-overlay">
        <!-- Joystick di chuyển -->
        <div id="joystick-container">
            <div id="joystick-knob"></div>
        </div>

        <!-- Vùng nhìn xung quanh -->
        <div id="touch-camera-area"></div>

        <!-- Các nút chức năng -->
        <div id="btn-inventory" class="touch-btn">E</div>
        <div id="btn-jump" class="touch-btn">JUMP</div>
        <div id="btn-crouch" class="touch-btn">SHIFT</div>
        <div id="btn-attack" class="touch-btn">L-CLICK</div>
        <div id="btn-place" class="touch-btn">R-CLICK</div>
    </div>

    <!-- Countdown screen giống bản gốc -->
    <div id="launch_countdown_screen">
        <div>
            <h1>Minecraft 1.12.2</h1>
            <h2 id="status-text">Game will launch in <span id="launchCountdownNumber">3</span>...</h2>
            <div class="progress-border">
                <div id="launchCountdownProgress"></div>
            </div>
            <button id="skipCountdown" autofocus>Skip</button>
        </div>
    </div>

    <!-- 1. Set eaglercraftXOpts TRƯỚC khi load game -->
    <script type="text/javascript">
        "use strict";
        window.eaglercraftXOpts = {
            container: "game_frame",
            worldsDB: "worlds",
            mobile: true,
            allowServerConfig: true,
            enableMultiplayer: true,
            relays: [
                { addr: "wss://relay.deev.is/", name: "Lax1dude Relay #1" },
                { addr: "wss://relay.lax1dude.net/", name: "Lax1dude Relay #2" },
                { addr: "wss://relay.shhnowisnottheti.me/", name: "Ayunami Relay #1" },
                { addr: "wss://relay.eaglercraft.com/", name: "Official Relay #1" },
                { addr: "wss://relay.de0.cc/", name: "Official Relay #2" }
            ]
        };
    </script>

    <!-- 2. Logic Mobile Controls & Countdown -->
    <script type="text/javascript">
        (function () {
            "use strict";

            // --- Mobile Detection & Setup ---
            var isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent) || (window.innerWidth < 800);
            var overlay = document.getElementById("mobile-overlay");
            if (isMobile) {
                overlay.style.display = "block";
            }

            // --- Input Simulation Functions ---
            function simulateKey(code, type) {
                var event = new KeyboardEvent(type, {
                    code: code,
                    key: code,
                    bubbles: true,
                    cancelable: true
                });
                document.dispatchEvent(event);
            }

            function simulateMouse(type, button) {
                var event = new MouseEvent(type, {
                    button: button,
                    bubbles: true,
                    cancelable: true
                });
                document.dispatchEvent(event);
            }

            // --- Joystick Logic ---
            var joystick = document.getElementById("joystick-container");
            var knob = document.getElementById("joystick-knob");
            var joystickActive = false;
            var currentKeys = { W: false, A: false, S: false, D: false };

            joystick.addEventListener("touchstart", function (e) {
                joystickActive = true;
                handleJoystick(e.targetTouches[0]);
            }, { passive: false });

            document.addEventListener("touchmove", function (e) {
                if (joystickActive) {
                    for (var i = 0; i < e.targetTouches.length; i++) {
                        if (e.targetTouches[i].target === joystick || joystick.contains(e.targetTouches[i].target)) {
                            handleJoystick(e.targetTouches[i]);
                            e.preventDefault();
                        }
                    }
                }
            }, { passive: false });

            document.addEventListener("touchend", function (e) {
                if (joystickActive) {
                    var stillInJoystick = false;
                    for (var i = 0; i < e.touches.length; i++) {
                        if (e.touches[i].target === joystick || joystick.contains(e.touches[i].target)) stillInJoystick = true;
                    }
                    if (!stillInJoystick) {
                        joystickActive = false;
                        resetJoystick();
                    }
                }
            });

            function handleJoystick(touch) {
                var rect = joystick.getBoundingClientRect();
                var centerX = rect.left + rect.width / 2;
                var centerY = rect.top + rect.height / 2;
                var dx = touch.clientX - centerX;
                var dy = touch.clientY - centerY;
                var dist = Math.sqrt(dx * dx + dy * dy);
                var maxDist = rect.width / 2;

                if (dist > maxDist) {
                    dx *= maxDist / dist;
                    dy *= maxDist / dist;
                    dist = maxDist;
                }

                knob.style.transform = "translate(" + dx + "px, " + dy + "px)";

                // Simulate WASD
                var threshold = 0.3;
                var nx = dx / maxDist;
                var ny = dy / maxDist;

                updateKey("KeyW", ny < -threshold);
                updateKey("KeyS", ny > threshold);
                updateKey("KeyA", nx < -threshold);
                updateKey("KeyD", nx > threshold);
            }

            function updateKey(code, active) {
                var keyName = code.replace("Key", "");
                if (active && !currentKeys[keyName]) {
                    simulateKey(code, "keydown");
                    currentKeys[keyName] = true;
                } else if (!active && currentKeys[keyName]) {
                    simulateKey(code, "keyup");
                    currentKeys[keyName] = false;
                }
            }

            function resetJoystick() {
                knob.style.transform = "translate(0, 0)";
                updateKey("KeyW", false);
                updateKey("KeyS", false);
                updateKey("KeyA", false);
                updateKey("KeyD", false);
            }

            // --- Camera Touch Logic ---
            var cameraArea = document.getElementById("touch-camera-area");
            var lastTouchX, lastTouchY;

            cameraArea.addEventListener("touchstart", function (e) {
                lastTouchX = e.targetTouches[0].clientX;
                lastTouchY = e.targetTouches[0].clientY;
            });

            cameraArea.addEventListener("touchmove", function (e) {
                var touch = e.targetTouches[0];
                var movementX = (touch.clientX - lastTouchX) * 2.5;
                var movementY = (touch.clientY - lastTouchY) * 2.5;

                // Giả lập di chuyển chuột - Eaglercraft thường bắt sự kiện mousemove
                var mouseEvent = new MouseEvent("mousemove", {
                    bubbles: true,
                    cancelable: true,
                    clientX: touch.clientX,
                    clientY: touch.clientY,
                    movementX: movementX,
                    movementY: movementY
                });
                document.dispatchEvent(mouseEvent);

                lastTouchX = touch.clientX;
                lastTouchY = touch.clientY;
                e.preventDefault();
            }, { passive: false });

            // --- Buttons Logic ---
            function bindBtn(id, keyCode, mouseButton) {
                var btn = document.getElementById(id);
                btn.addEventListener("touchstart", function (e) {
                    e.preventDefault();
                    if (keyCode) simulateKey(keyCode, "keydown");
                    if (mouseButton !== undefined) simulateMouse("mousedown", mouseButton);
                });
                btn.addEventListener("touchend", function (e) {
                    e.preventDefault();
                    if (keyCode) simulateKey(keyCode, "keyup");
                    if (mouseButton !== undefined) simulateMouse("mouseup", mouseButton);
                });
            }

            bindBtn("btn-jump", "Space");
            bindBtn("btn-inventory", "KeyE");
            bindBtn("btn-crouch", "ShiftLeft");
            bindBtn("btn-attack", null, 0); // Left Click
            bindBtn("btn-place", null, 2);  // Right Click

            // --- Countdown & Game Loading ---
            var countdownSec = 3;
            var countdownEl = document.getElementById("launchCountdownNumber");
            var progressEl = document.getElementById("launchCountdownProgress");
            var skipBtn = document.getElementById("skipCountdown");
            var screenEl = document.getElementById("launch_countdown_screen");
            var skipped = false;

            function startGame() {
                if (skipped) return;
                skipped = true;

                // Cập nhật trạng thái
                var statusText = document.getElementById("status-text");
                if (statusText) statusText.textContent = "Loading Game Engine...";

                // Fade out countdown screen từ từ
                setTimeout(function () {
                    screenEl.style.transition = "opacity 1s";
                    screenEl.style.opacity = "0";
                    setTimeout(function () {
                        screenEl.style.display = "none";
                    }, 1000);
                }, 500);

                // Load game.js
                var script = document.createElement("script");
                script.type = "text/javascript";
                script.src = "/game/1.12.2/game.js";
                script.async = true;

                script.onload = function () {
                    console.log("Game script loaded successfully");
                };

                script.onerror = function () {
                    alert("Lỗi: Không thể tải file game.js. Hãy kiểm tra lại kết nối hoặc file.");
                };

                document.body.appendChild(script);
            }

            skipBtn.addEventListener("click", function () {
                startGame();
            });

            var remaining = countdownSec;
            var timer = setInterval(function () {
                remaining--;
                if (remaining <= 0) {
                    clearInterval(timer);
                    progressEl.style.width = "100%";
                    countdownEl.textContent = "0";
                    startGame();
                } else {
                    countdownEl.textContent = remaining;
                    progressEl.style.width = ((countdownSec - remaining) / countdownSec * 100) + "%";
                }
            }, 1000);
        })();
    </script>
</body>

</html>

<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minecraft Web - Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #22c55e;
            --primary-hover: #16a34a;
            --bg-dark: rgba(10, 10, 10, 0.8);
            --glass: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background: #020617;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            color: white;
        }

        .background {
            position: fixed;
            inset: 0;
            background: linear-gradient(125deg, #0f172a 0%, #020617 100%);
            z-index: -1;
        }

        .background::after {
            content: "";
            position: absolute;
            inset: 0;
            background-image: 
                radial-gradient(circle at 20% 30%, rgba(34, 197, 94, 0.15) 0%, transparent 40%),
                radial-gradient(circle at 80% 70%, rgba(59, 130, 246, 0.15) 0%, transparent 40%);
            filter: blur(80px);
            animation: pulse 15s infinite alternate ease-in-out;
        }

        @keyframes pulse {
            0% { transform: scale(1) translate(0, 0); opacity: 0.5; }
            100% { transform: scale(1.3) translate(2%, 2%); opacity: 0.8; }
        }

        .login-card {
            background: var(--glass);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border: 1px solid var(--glass-border);
            padding: 48px;
            border-radius: 32px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 40px 80px -20px rgba(0, 0, 0, 0.6);
            text-align: center;
            position: relative;
            z-index: 10;
            animation: fadeIn 1.2s cubic-bezier(0.22, 1, 0.36, 1);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(40px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .logo {
            font-size: 38px;
            font-weight: 800;
            letter-spacing: -2px;
            margin-bottom: 12px;
            background: linear-gradient(135deg, #fff 0%, #94a3b8 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .subtitle {
            font-size: 15px;
            color: #64748b;
            margin-bottom: 40px;
            font-weight: 400;
        }

        .input-group {
            text-align: left;
            margin-bottom: 32px;
        }

        .input-group label {
            display: block;
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            color: #475569;
            margin-bottom: 10px;
            margin-left: 4px;
            letter-spacing: 1px;
        }

        input {
            width: 100%;
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid var(--glass-border);
            padding: 18px 20px;
            border-radius: 16px;
            color: white;
            font-size: 16px;
            outline: none;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            font-family: inherit;
        }

        input:focus {
            border-color: var(--primary);
            background: rgba(0, 0, 0, 0.6);
            box-shadow: 0 0 0 4px rgba(34, 197, 94, 0.15);
        }

        .play-btn {
            width: 100%;
            background: var(--primary);
            color: white;
            border: none;
            padding: 20px;
            border-radius: 16px;
            font-size: 17px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            box-shadow: 0 10px 25px -5px rgba(34, 197, 94, 0.3);
        }

        .play-btn:hover {
            background: var(--primary-hover);
            transform: translateY(-3px);
            box-shadow: 0 20px 35px -10px rgba(34, 197, 94, 0.5);
        }

        .play-btn:active {
            transform: translateY(-1px);
        }

        .play-btn svg {
            transition: transform 0.3s ease;
        }

        .play-btn:hover svg {
            transform: translateX(4px);
        }

        .footer-note {
            margin-top: 32px;
            font-size: 13px;
            color: #334155;
            font-weight: 500;
        }
    </style>
</head>
<body>
    <div class="background"></div>
    
    <div class="login-card">
        <div class="logo">MINECRAFT WEB</div>
        <p class="subtitle">Eaglercraft 1.12.2 Premium Client</p>

        <div class="input-group">
            <label>Tên nhân vật</label>
            <input type="text" id="username" placeholder="Nhập nickname..." maxlength="16" spellcheck="false" autocomplete="off">
        </div>

        <button class="play-btn" id="playBtn">
            <span>VÀO GAME NGAY</span>
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
        </button>

        <p class="footer-note">Powered by Antigravity AI Engine</p>
    </div>

    <script>
        const playBtn = document.getElementById('playBtn');
        const usernameInput = document.getElementById('username');

        // Tạo tên ngẫu nhiên ban đầu
        const prefixes = ["Big", "Super", "Master", "The", "Epic", "Pro", "Ultra"];
        const names = ["Creeper", "Steve", "Alex", "Dragon", "Hunter", "Warrior", "Miner"];
        usernameInput.value = prefixes[Math.floor(Math.random() * prefixes.length)] + names[Math.floor(Math.random() * names.length)] + Math.floor(Math.random() * 99);

        playBtn.addEventListener('click', () => {
            const name = usernameInput.value.trim() || "Steve";
            
            // Hiệu ứng chuyển cảnh
            playBtn.disabled = true;
            playBtn.style.opacity = '0.8';
            playBtn.querySelector('span').textContent = 'ĐANG KHỞI TẠO...';
            
            document.querySelector('.login-card').style.transform = 'scale(0.95)';
            document.querySelector('.login-card').style.opacity = '0';
            document.querySelector('.login-card').style.transition = 'all 0.5s ease-in';
            
            setTimeout(() => {
                window.location.href = `play.html?username=${encodeURIComponent(name)}`;
            }, 400);
        });

        usernameInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') playBtn.click();
        });

        window.addEventListener('load', () => {
            usernameInput.focus();
            usernameInput.select();
        });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="vi" style="width:100%;height:100%;background-color:black;">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0">
    <title>Minecraft 1.12.2 - Playing</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html { width: 100%; height: 100%; overflow: hidden; background: #000; touch-action: none; }
        #game_frame { width: 100%; height: 100%; position: absolute; top: 0; left: 0; z-index: 1; }
        
        #back-btn {
            position: fixed; top: 10px; right: 10px; z-index: 100001;
            background: rgba(0, 0, 0, 0.6); color: white; border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 8px 16px; border-radius: 8px; cursor: pointer; font-size: 13px;
            backdrop-filter: blur(5px); transition: all 0.2s; font-family: sans-serif;
        }

        #launch_countdown_screen {
            position: fixed; inset: 0; display: flex; align-items: center; justify-content: center;
            background: #0a0a0a; z-index: 100005; transition: opacity 0.8s ease-out;
        }

        .loader-content { text-align: center; color: white; font-family: sans-serif; width: 80%; max-width: 400px; }
        #status-text { font-size: 14px; color: #aaa; margin: 10px 0; min-height: 20px; }
        
        .progress-container {
            width: 100%; height: 6px; background: rgba(255, 255, 255, 0.1);
            border-radius: 3px; overflow: hidden; margin: 20px 0;
        }

        #launchCountdownProgress { height: 100%; background: #22c55e; width: 0%; transition: width 0.4s ease; }
        #skipCountdown {
            background: #333; color: white; padding: 10px 20px; border-radius: 6px;
            border: none; cursor: pointer; font-size: 14px;
        }
        #error-log { color: #ff4444; font-size: 12px; margin-top: 15px; font-family: monospace; }
    </style>
</head>

<body>
    <div id="game_frame"></div>
    <button id="back-btn" onclick="history.back()">✕ Thoát</button>

    <div id="launch_countdown_screen">
        <div class="loader-content">
            <h1 style="letter-spacing: 2px;">MINECRAFT 1.12.2</h1>
            <p id="status-text">Đang chuẩn bị...</p>
            <div class="progress-container">
                <div id="launchCountdownProgress"></div>
            </div>
            <button id="skipCountdown">Bắt đầu ngay</button>
            <div id="error-log"></div>
        </div>
    </div>

    <script type="text/javascript">
        "use strict";
        const urlParams = new URLSearchParams(window.location.search);
        const username = urlParams.get("username") || "Steve";
        const isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent) || (window.innerWidth < 1024);

        window.eaglercraftXOpts = {
            container: "game_frame",
            worldsDB: "worlds",
            playerName: username,
            allowServerConfig: true,
            enableMultiplayer: true,
            allowLAN: true,
            checkRelays: true,
            forceIntegratedServer: true,
            integratedServer: true,
            mobile: urlParams.get("mobile") === "true" || isMobile,
            relays: [
                { addr: "wss://relay.webmc.fun/", name: "WebMC Relay (Stable)" },
                { addr: "wss://relay.de0.cc/", name: "Official Relay #1" },
                { addr: "wss://relay.lax1dude.net/", name: "Lax1dude Relay #2" },
                { addr: "wss://relay.deev.is/", name: "Deev.is Relay" }
            ],
            mainMenu: {
                splashes: ["Ready to Play!", "Eaglercraft 1.12.2"],
                brand: "Minecraft Web"
            }
        };

        function logError(msg) {
            document.getElementById("error-log").innerText = "Lỗi: " + msg;
            console.error(msg);
        }

        // Pointer Lock Bridge
        (function() {
            let virtualLock = false;
            window.addEventListener('message', e => {
                if(e.data.type === 'set-virtual-lock') {
                    virtualLock = !!e.data.value;
                    document.dispatchEvent(new Event('pointerlockchange'));
                }
            });
            Object.defineProperty(document, 'pointerLockElement', {
                get: () => virtualLock ? document.getElementById('game_frame') : null
            });
        })();
    </script>

    <script type="text/javascript">
        (function () {
            const screenEl = document.getElementById("launch_countdown_screen");
            const statusText = document.getElementById("status-text");
            const progress = document.getElementById("launchCountdownProgress");
            let launched = false;

            function loadScript(src, onProgress, next) {
                statusText.textContent = "Đang tải " + src + "...";
                const s = document.createElement("script");
                s.src = src + "?v=" + Date.now(); // Tránh cache
                s.crossOrigin = "anonymous";
                s.async = true;
                s.onload = () => {
                    progress.style.width = onProgress + "%";
                    next();
                };
                s.onerror = () => logError("Không thể tải " + src);
                document.body.appendChild(s);
            }

            function startGame() {
                if (launched) return;
                launched = true;
                
                // Chuỗi nạp script
                loadScript("game-engine.js", 30, () => {
                    loadScript("assets-data.js", 60, () => {
                        loadScript("game.js", 90, () => {
                            statusText.textContent = "Đang cấu hình Engine...";
                            setTimeout(() => {
                                try {
                                    if (typeof main === "function") {
                                        console.log("[Play] Khởi chạy engine...");
                                        
                                        // Áp dụng bản vá LAN trước khi chạy main
                                        if (typeof window.applyEaglercraftLanPatch === "function") {
                                            console.log("[Play] Đang áp dụng bản vá LAN...");
                                            window.applyEaglercraftLanPatch();
                                        }

                                        main();
                                        
                                        progress.style.width = "100%";
                                        screenEl.style.opacity = "0";
                                        setTimeout(() => screenEl.style.display = "none", 800);
                                        console.log("[Play] Engine đã khởi động.");
                                    } else {
                                        logError("Không tìm thấy hàm main() trong game.js");
                                    }
                                } catch(e) {
                                    console.error("[Play] Lỗi khởi tạo:", e);
                                    logError("Lỗi khởi tạo: " + e.message);
                                }
                            }, 500);
                        });
                    });
                });
            }

            document.getElementById("skipCountdown").onclick = startGame;
            let count = 2;
            const timer = setInterval(() => {
                count--;
                if (count <= 0) { clearInterval(timer); startGame(); }
                else { statusText.textContent = `Bắt đầu sau ${count}...`; }
            }, 1000);
        })();
    </script>
</body>
</html>

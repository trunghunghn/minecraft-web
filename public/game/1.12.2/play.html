<!DOCTYPE html>
<html lang="vi" style="width:100%;height:100%;background-color:black;">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0">
    <title>Minecraft 1.12.2 - Playing</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #121212;
            touch-action: none;
        }

        #back-btn {
            position: fixed;
            top: 8px;
            right: 8px;
            z-index: 100001;
            background: rgba(0, 0, 0, 0.7);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 6px 14px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 12px;
            opacity: 0.5;
            transition: opacity 0.3s;
            font-family: sans-serif;
        }

        #back-btn:hover {
            opacity: 1;
            background: rgba(0, 0, 0, 0.9);
        }

        /* Mobile Controls Styling */
        #mobile-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 100000;
            pointer-events: none;
            display: none;
            font-family: monospace;
        }

        #mobile-overlay .touch-btn {
            pointer-events: auto;
            position: absolute;
            background: rgba(128, 128, 128, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
            user-select: none;
            -webkit-user-select: none;
            font-size: 11px;
            text-transform: uppercase;
        }

        #mobile-overlay .touch-btn:active {
            background: rgba(255, 255, 255, 0.3);
        }

        /* Top Utility Bar */
        #top-bar {
            position: absolute;
            top: 5px;
            left: 5px;
            display: flex;
            gap: 2px;
            pointer-events: none;
        }

        .top-btn {
            width: 70px;
            height: 30px;
            position: relative !important;
        }

        /* Bottom Left 3x3 Grid */
        #grid-container {
            position: absolute;
            bottom: 5px;
            left: 5px;
            width: 186px;
            height: 186px;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            grid-template-rows: repeat(3, 1fr);
            gap: 2px;
            pointer-events: none;
        }

        #grid-container .touch-btn {
            position: relative;
            width: 60px;
            height: 60px;
        }

        #touch-camera-area {
            position: absolute;
            right: 0;
            top: 40px;
            width: 70%;
            height: calc(100% - 40px);
            pointer-events: auto;
        }

        /* Special jump button on the right */
        #btn-jump-right {
            position: absolute;
            bottom: 150px;
            right: 20px;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.1);
        }

        #launch_countdown_screen {
            margin: 0px;
            width: 100%;
            height: 100%;
            font-family: sans-serif;
            display: flex;
            align-items: center;
            user-select: none;
            background: #121212;
            position: fixed;
            z-index: 100005;
        }

        #launch_countdown_screen>div {
            margin: auto;
            text-align: center;
            color: #FFFFFF;
        }

        .progress-border {
            border: 2px solid #FFFFFF;
            width: 80%;
            max-width: 400px;
            height: 15px;
            padding: 1px;
            margin: 0 auto 2vh;
        }

        #launchCountdownProgress {
            background-color: #555555;
            width: 0%;
            height: 100%;
            transition: width 0.3s;
        }

        #skipCountdown {
            padding: 10px 20px;
            font-size: 1rem;
            color: #FFFFFF;
            background-color: #333333;
            border: none;
            cursor: pointer;
            border-radius: 5px;
        }
    </style>
</head>

<body id="game_frame">
    <button id="back-btn" onclick="history.back()">✕ Quay lại</button>

    <div id="mobile-overlay">
        <div id="top-bar">
            <div id="btn-debug" class="touch-btn top-btn">DEBUG</div>
            <div id="btn-chat" class="touch-btn top-btn">CHAT</div>
            <div id="btn-keyboard-toggle" class="touch-btn top-btn">KEYBOARD</div>
            <div id="btn-tab" class="touch-btn top-btn">TAB</div>
            <div id="btn-view" class="touch-btn top-btn">3RD</div>
        </div>
        <div id="grid-container">
            <div id="btn-pri" class="touch-btn">PRI</div>
            <div id="btn-up" class="touch-btn">▲</div>
            <div id="btn-sec" class="touch-btn">SEC</div>
            <div id="btn-left" class="touch-btn">◀</div>
            <div id="btn-center" class="touch-btn">◇</div>
            <div id="btn-right" class="touch-btn">▶</div>
            <div id="btn-gui" class="touch-btn">GUI</div>
            <div id="btn-down" class="touch-btn">▼</div>
            <div id="btn-inventory" class="touch-btn">INV</div>
        </div>
        <div id="touch-camera-area"></div>
        <div id="btn-jump-right" class="touch-btn">JUMP</div>
    </div>

    <div id="launch_countdown_screen">
        <div>
            <h1>Minecraft 1.12.2</h1>
            <h2 id="status-text">Bắt đầu sau <span id="launchCountdownNumber">3</span>...</h2>
            <div class="progress-border">
                <div id="launchCountdownProgress"></div>
            </div>
            <button id="skipCountdown" autofocus>Skip</button>
        </div>
    </div>

    <script type="text/javascript">
        "use strict";
        window.eaglercraftXOpts = {
            container: "game_frame",
            worldsDB: "worlds",
            allowServerConfig: true,
            enableMultiplayer: true,
            mobile: true,
            relays: [
                { addr: "wss://relay.deev.is/", name: "deev.is relay" },
                { addr: "wss://relay.lax1dude.net/", name: "lax1dude relay" },
                { addr: "wss://relay.shcminecraft.xyz/", name: "shcminecraft relay" },
                { addr: "wss://relay.shcminecraft.com/", name: "shcminecraft relay 2" }
            ],
            mainMenu: {
                splashes: ["LAN Support Enabled!", "Coding with AI!"],
                brand: "EaglercraftX AI"
            }
        };
    </script>

    <script type="text/javascript">
        (function () {
            "use strict";

            var isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent) || (window.innerWidth < 800);
            var overlay = document.getElementById("mobile-overlay");
            if (isMobile) {
                overlay.style.display = "block";
            }

            // Keyboard/Mouse Simulation
            function simulateKey(code, type) {
                document.dispatchEvent(new KeyboardEvent(type, { code: code, key: code, bubbles: true }));
            }
            function simulateMouse(type, button) {
                document.dispatchEvent(new MouseEvent(type, { button: button, bubbles: true }));
            }

            // Movement Bindings
            function bindMovement(id, code) {
                var b = document.getElementById(id);
                if (!b) return;
                b.addEventListener("touchstart", function (e) {
                    e.preventDefault();
                    simulateKey(code, "keydown");
                }, { passive: false });
                b.addEventListener("touchend", function (e) {
                    e.preventDefault();
                    simulateKey(code, "keyup");
                }, { passive: false });
            }

            bindMovement("btn-up", "KeyW");
            bindMovement("btn-down", "KeyS");
            bindMovement("btn-left", "KeyA");
            bindMovement("btn-right", "KeyD");

            // Utility Bindings
            bindBtn("btn-debug", "F3");
            bindBtn("btn-chat", "KeyT");
            bindBtn("btn-tab", "Tab");
            bindBtn("btn-view", "F5");
            bindBtn("btn-gui", "F1");
            bindBtn("btn-inventory", "KeyE");
            bindBtn("btn-center", "ShiftLeft");
            bindBtn("btn-jump-right", "Space");

            // Mouse Bindings
            bindBtn("btn-pri", null, 0);
            bindBtn("btn-sec", null, 2);

            // Keyboard Toggle
            document.getElementById("btn-keyboard-toggle").onclick = function () {
                var val = prompt("Enter text:");
                if (val) {
                    // Logic to inject text would go here
                }
            };

            // Camera Area
            var cameraArea = document.getElementById("touch-camera-area");
            var lastTouchX, lastTouchY;
            cameraArea.addEventListener("touchstart", function (e) { lastTouchX = e.touches[0].clientX; lastTouchY = e.touches[0].clientY; });
            cameraArea.addEventListener("touchmove", function (e) {
                var touch = e.touches[0];
                var mx = (touch.clientX - lastTouchX) * 2;
                var my = (touch.clientY - lastTouchY) * 2;
                document.dispatchEvent(new MouseEvent("mousemove", { bubbles: true, movementX: mx, movementY: my, clientX: touch.clientX, clientY: touch.clientY }));
                lastTouchX = touch.clientX; lastTouchY = touch.clientY; e.preventDefault();
            }, { passive: false });

            // Buttons Helper
            function bindBtn(id, k, m) {
                var b = document.getElementById(id);
                if (!b) return;
                b.addEventListener("touchstart", function (e) { e.preventDefault(); if (k) simulateKey(k, "keydown"); if (m !== undefined) simulateMouse("mousedown", m); });
                b.addEventListener("touchend", function (e) { e.preventDefault(); if (k) simulateKey(k, "keyup"); if (m !== undefined) simulateMouse("mouseup", m); });
            }

            // Countdown & Loading
            var screenEl = document.getElementById("launch_countdown_screen");
            var statusText = document.getElementById("status-text");
            var skipped = false;

            function startGame() {
                if (skipped) return;
                skipped = true;
                statusText.textContent = "Nạp tài nguyên...";

                screenEl.style.transition = "opacity 1s";
                screenEl.style.opacity = "0";
                setTimeout(function () { screenEl.style.display = "none"; }, 1000);

                var assets = document.createElement("script");
                assets.src = "assets-data.js";
                assets.onload = function () {
                    statusText.textContent = "Khởi động engine...";
                    var engine = document.createElement("script");
                    engine.src = "game-engine.js";
                    document.body.appendChild(engine);
                };
                document.body.appendChild(assets);
            }

            document.getElementById("skipCountdown").onclick = startGame;
            var rem = 3;
            var t = setInterval(function () {
                rem--;
                if (rem <= 0) { clearInterval(t); startGame(); }
                else { document.getElementById("launchCountdownNumber").textContent = rem; document.getElementById("launchCountdownProgress").style.width = ((3 - rem) / 3 * 100) + "%"; }
            }, 1000);
        })();
    </script>
</body>

</html>
